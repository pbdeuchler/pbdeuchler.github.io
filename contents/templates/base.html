{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{block "description" .}}Don't panic{{end}}">
  <title>{{.Title}}</title>
  <link rel="canonical" href="https://pbdeuchler.github.io/{{block "canonical" .}}{{end}}">
  <link rel="icon" href="/img/favicon.ico">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>
  <div class="site">
    <header class="site-header">
      <a class="site-name" href="/">Lots Of Adverbs</a>
      <nav>
        <ul>
          {{block "nav" .}}
          <li>{{if eq .Path "/"}}<span class="nav-current">Posts</span>{{else}}<a href="/">Posts</a>{{end}}</li>
          <li>{{if eq .Path "/about/"}}<span class="nav-current">About</span>{{else}}<a href="/about/">About</a>{{end}}</li>
          {{end}}
        </ul>
      </nav>
    </header>

    <div class="header-photo">
      <img id="header-photo" alt="">
    </div>
    <script>
    (function() {
      var imgs = [{{range $i, $v := .HeaderImages}}{{if $i}},{{end}}"{{$v}}"{{end}}];
      if (imgs.length) {
        var img = imgs[Math.floor(Math.random() * imgs.length)];
        document.getElementById("header-photo").src = "/img/headers/" + encodeURIComponent(img);
      }
    })();
    </script>

    <main>
      {{block "content" .}}{{end}}
    </main>

    <footer class="site-footer">
      <div class="social">
        <a href="https://github.com/pbdeuchler" target="_blank" rel="noopener" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://twitter.com/false1001" target="_blank" rel="noopener" aria-label="Twitter"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="mailto:pbdeuchler+ghpages@gmail.com" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
      </div>
    </footer>
  </div>
  <script>
  (function() {
    var refs = document.querySelectorAll('.footnote-ref');
    refs.forEach(function(a) {
      var id = a.getAttribute('href').slice(1);
      var li = document.getElementById(id);
      if (!li) return;
      var tip = document.createElement('span');
      tip.className = 'fn-tooltip';
      var content = li.cloneNode(true);
      var backref = content.querySelector('.footnote-backref');
      if (backref) backref.remove();
      tip.innerHTML = content.innerHTML;
      a.parentElement.style.position = 'relative';
      a.parentElement.appendChild(tip);
      a.addEventListener('mouseenter', function() { tip.classList.add('visible'); });
      a.addEventListener('mouseleave', function() { tip.classList.remove('visible'); });
    });
  })();
  </script>
</body>
</html>{{end}}
